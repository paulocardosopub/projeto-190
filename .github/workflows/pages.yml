name: Deploy web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write public online config
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL || '' }}
          SUPABASE_KEY: ${{ vars.SUPABASE_KEY || secrets.SUPABASE_KEY || '' }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const fallback = {
            url: "https://gvmlydtkqatqhdsgyjqn.supabase.co",
            key: "sb_publishable_ylUc7xy4c-ajeJN5qpy61Q_KCh0vMJK"
          };
          const config = {
            url: process.env.SUPABASE_URL || fallback.url,
            key: process.env.SUPABASE_KEY || fallback.key
          };
          fs.mkdirSync("src/config", { recursive: true });
          fs.writeFileSync(
            "src/config/publicOnlineConfig.js",
            `window.PROJETO190_SUPABASE = ${JSON.stringify(config, null, 2)};\ndocument.documentElement.dataset.onlineConfig = "loaded";\n`
          );
          NODE

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css player.png paginas.png sw.js _site/
          cp -R assets src _site/
          node - <<'NODE'
          const fs = require("fs");
          const indexPath = "_site/index.html";
          const sha = process.env.GITHUB_SHA || "local-dev";
          const source = fs.readFileSync(indexPath, "utf8");
          fs.writeFileSync(
            indexPath,
            source.replace(
              'window.PROJETO190_CLIENT_VERSION = "local-dev";',
              `window.PROJETO190_CLIENT_VERSION = ${JSON.stringify(sha)};`
            )
          );
          NODE
          cat > _site/version.json <<EOF
          {"version":"${GITHUB_SHA}","builtAt":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","source":"github-pages"}
          EOF
          find _site -name '*.before-*' -type f -delete
          touch _site/.nojekyll

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true
